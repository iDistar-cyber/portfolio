<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0e1015"/>
  <defs>
    <!-- Background glow -->
    <radialGradient id="mixed-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ccff00" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0e1015" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Technical Grid -->
  <path d="M 0,35 L 600,35 M 0,70 L 600,70 M 0,105 L 600,105 M 0,140 L 600,140 M 0,175 L 600,175 M 0,210 L 600,210 M 0,245 L 600,245 M 0,280 L 600,280 M 0,315 L 600,315" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <path d="M 50,0 L 50,350 M 100,0 L 100,350 M 150,0 L 150,350 M 200,0 L 200,350 M 250,0 L 250,350 M 300,0 L 300,350 M 350,0 L 350,350 M 400,0 L 400,350 M 450,0 L 450,350 M 500,0 L 500,350 M 550,0 L 550,350" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <rect x="0" y="0" width="600" height="350" fill="url(#mixed-glow)"/>

  <!-- Vertical Divider (representing the split) -->
  <line x1="300" y1="20" x2="300" y2="330" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" stroke-dasharray="4 4"/>
  
  <!-- Left Side: Rough / Raster / Dotted Sketch (Red/Orange theme or pixelated white) -->
  <!-- Rough sketchy profile shape using segmented lines to simulate rough sketch -->
  <g stroke="rgba(255, 77, 77, 0.4)" stroke-width="2.5" fill="none" opacity="0.8">
    <path d="M 50,220 C 80,240 100,210 120,180" stroke-dasharray="3 3"/>
    <path d="M 122,178 C 140,150 160,110 200,100" stroke-dasharray="2 4"/>
    <path d="M 198,99 C 230,90 270,120 300,160" stroke-dasharray="1 3"/>
    <!-- Pencil overlay guide lines -->
    <line x1="40" y1="230" x2="150" y2="150" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <line x1="180" y1="70" x2="280" y2="190" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="120" cy="180" r="15" stroke="rgba(255,77,77,0.15)" stroke-width="1"/>
    <circle cx="200" cy="100" r="15" stroke="rgba(255,77,77,0.15)" stroke-width="1"/>
  </g>
  <text x="50" y="80" fill="#ff4d4d" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1">DRAFT_SOURCE: RASTER / SKETCH</text>

  <!-- Right Side: Perfect Glowing Bezier Path (Cyber Lime / Cyan) -->
  <g fill="none">
    <!-- Flawless vector bezier curve -->
    <path d="M 300,160 C 330,200 370,230 400,220 C 430,210 460,150 500,120 C 530,98 560,130 570,140" stroke="#ccff00" stroke-width="3.5" filter="drop-shadow(0 0 10px rgba(204, 255, 0, 0.6))"/>
    
    <!-- Vector nodes and handle guidelines -->
    <!-- Handle 1 -->
    <line x1="400" y1="220" x2="370" y2="230" stroke="#00e5ff" stroke-width="1.2"/>
    <circle cx="370" cy="230" r="4" fill="#0a0b0e" stroke="#00e5ff" stroke-width="1.5"/>
    <rect x="395" y="215" width="10" height="10" fill="#ccff00" stroke="#0a0b0e" stroke-width="2"/>
    
    <!-- Handle 2 -->
    <line x1="500" y1="120" x2="470" y2="135" stroke="#00e5ff" stroke-width="1.2"/>
    <line x1="500" y1="120" x2="530" y2="105" stroke="#00e5ff" stroke-width="1.2"/>
    <circle cx="470" cy="135" r="4" fill="#0a0b0e" stroke="#00e5ff" stroke-width="1.5"/>
    <circle cx="530" cy="105" r="4" fill="#0a0b0e" stroke="#00e5ff" stroke-width="1.5"/>
    <rect x="495" y="115" width="10" height="10" fill="#ccff00" stroke="#0a0b0e" stroke-width="2"/>
  </g>
  <text x="550" y="80" fill="#ccff00" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1" text-anchor="end">OUTPUT: BEZIER_CURVES</text>

  <!-- Technical specs overlay -->
  <text x="35" y="55" fill="#ccff00" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" letter-spacing="1">MANUAL.TRACE // SKETCH_TO_VECTOR</text>
  <text x="35" y="315" fill="rgba(255,255,255,0.3)" font-family="'JetBrains Mono', monospace" font-size="10">SOURCE: 150 DPI JPG | RESULT: PERFECT SVG / AI VECTOR</text>
  <text x="565" y="315" fill="#00e5ff" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="end">ZOOM: 1600%</text>

  <!-- Corner Brackets -->
  <path d="M 20,40 L 20,20 L 40,20" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.5" fill="none"/>
  <path d="M 580,40 L 580,20 L 560,20" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.5" fill="none"/>
  <path d="M 20,310 L 20,330 L 40,330" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.5" fill="none"/>
  <path d="M 580,310 L 580,330 L 560,330" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.5" fill="none"/>
</svg>
