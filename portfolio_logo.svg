<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0e1015"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ccff00" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ccff00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Technical Grid -->
  <path d="M 0,35 L 600,35 M 0,70 L 600,70 M 0,105 L 600,105 M 0,140 L 600,140 M 0,175 L 600,175 M 0,210 L 600,210 M 0,245 L 600,245 M 0,280 L 600,280 M 0,315 L 600,315" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <path d="M 50,0 L 50,350 M 100,0 L 100,350 M 150,0 L 150,350 M 200,0 L 200,350 M 250,0 L 250,350 M 300,0 L 300,350 M 350,0 L 350,350 M 400,0 L 400,350 M 450,0 L 450,350 M 500,0 L 500,350 M 550,0 L 550,350" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <rect x="0" y="0" width="600" height="350" fill="url(#glow)"/>
  
  <!-- Outer circle design helper -->
  <circle cx="300" cy="175" r="130" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1" fill="none" stroke-dasharray="4 4"/>
  <circle cx="300" cy="175" r="100" stroke="rgba(204, 255, 0, 0.05)" stroke-width="1" fill="none"/>
  
  <!-- Geometric grid axes -->
  <line x1="300" y1="30" x2="300" y2="320" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" stroke-dasharray="2 4"/>
  
  <!-- Polygonal Cyber-Wolf Head Mesh (Pseudo-real complex tracing) -->
  <g stroke="rgba(204, 255, 0, 0.25)" stroke-width="1" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Ears -->
    <polygon points="260,140 220,80 280,120"/>
    <polygon points="340,140 380,80 320,120"/>
    
    <!-- Forehead -->
    <polygon points="300,90 260,140 300,165"/>
    <polygon points="300,90 340,140 300,165"/>
    
    <!-- Cheeks Outer -->
    <polygon points="220,80 200,190 260,140"/>
    <polygon points="380,80 400,190 340,140"/>
    
    <!-- Eye bridges -->
    <polygon points="260,140 270,160 300,165"/>
    <polygon points="340,140 330,160 300,165"/>
    
    <!-- Muzzle / Eyes -->
    <polygon points="270,160 280,220 300,165"/>
    <polygon points="330,160 320,220 300,165"/>
    
    <!-- Cheeks Lower -->
    <polygon points="200,190 280,220 270,160"/>
    <polygon points="400,190 320,220 330,160"/>
    
    <!-- Snout & Nose -->
    <polygon points="280,220 300,260 320,220"/>
    <polygon points="300,165 280,220 320,220"/>
    
    <!-- Jaw lower -->
    <polygon points="200,190 300,280 280,220"/>
    <polygon points="400,190 300,280 320,220"/>
  </g>
  
  <!-- Glowing Eyes (Cyber Lime fills to look premium) -->
  <polygon points="270,160 290,158 285,165 272,166" fill="#ccff00" opacity="0.8" filter="drop-shadow(0 0 4px #ccff00)"/>
  <polygon points="330,160 310,158 315,165 328,166" fill="#ccff00" opacity="0.8" filter="drop-shadow(0 0 4px #ccff00)"/>
  
  <!-- Active vector outlines representing the active Bezier curves under selection -->
  <path d="M 200,190 C 170,230 220,270 260,280" stroke="#ccff00" stroke-width="2.5" fill="none" filter="drop-shadow(0 0 8px rgba(204, 255, 0, 0.5))"/>
  <path d="M 400,190 C 430,230 380,270 340,280" stroke="#ccff00" stroke-width="2.5" fill="none" filter="drop-shadow(0 0 8px rgba(204, 255, 0, 0.5))"/>
  
  <!-- Vector Nodes (Squares and circles on active selection) -->
  <!-- Bezier handle neck left -->
  <line x1="200" y1="190" x2="160" y2="200" stroke="#00e5ff" stroke-width="1.2"/>
  <circle cx="160" cy="200" r="4.5" fill="#0a0b0e" stroke="#00e5ff" stroke-width="1.5"/>
  <rect x="195" y="185" width="10" height="10" fill="#ccff00" stroke="#0a0b0e" stroke-width="2"/>
  
  <!-- Bezier handle neck right -->
  <line x1="400" y1="190" x2="440" y2="200" stroke="#00e5ff" stroke-width="1.2"/>
  <circle cx="440" cy="200" r="4.5" fill="#0a0b0e" stroke="#00e5ff" stroke-width="1.5"/>
  <rect x="395" y="185" width="10" height="10" fill="#ccff00" stroke="#0a0b0e" stroke-width="2"/>
  
  <!-- Outer mesh anchor points -->
  <circle cx="220" cy="80" r="3.5" fill="#0a0b0e" stroke="rgba(204,255,0,0.6)" stroke-width="1.5"/>
  <circle cx="380" cy="80" r="3.5" fill="#0a0b0e" stroke="rgba(204,255,0,0.6)" stroke-width="1.5"/>
  <circle cx="300" cy="90" r="3.5" fill="#0a0b0e" stroke="rgba(204,255,0,0.6)" stroke-width="1.5"/>
  <circle cx="300" cy="280" r="4" fill="#ccff00" stroke="#0a0b0e" stroke-width="1.5"/>
  
  <!-- Interface HUD Elements -->
  <text x="35" y="55" fill="#ccff00" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" letter-spacing="1">CURVE.ENG_V3 // POLYGONAL_WOLF</text>
  <text x="35" y="315" fill="rgba(255,255,255,0.3)" font-family="'JetBrains Mono', monospace" font-size="10">MESH: 28 POLYGONS | RESOLUTION: INFINITE | ANCHORS: 16</text>
  <text x="490" y="55" fill="rgba(255,255,255,0.3)" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="end">GRID: 50x50px</text>
  
  <!-- Outer brutalist design bracket -->
  <path d="M 20,40 L 20,20 L 40,20" stroke="rgba(204, 255, 0, 0.4)" stroke-width="1.5" fill="none"/>
  <path d="M 580,40 L 580,20 L 560,20" stroke="rgba(204, 255, 0, 0.4)" stroke-width="1.5" fill="none"/>
  <path d="M 20,310 L 20,330 L 40,330" stroke="rgba(204, 255, 0, 0.4)" stroke-width="1.5" fill="none"/>
  <path d="M 580,310 L 580,330 L 560,330" stroke="rgba(204, 255, 0, 0.4)" stroke-width="1.5" fill="none"/>
</svg>
